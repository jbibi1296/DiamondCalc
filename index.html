<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ideal-Cut Diamond Weight Estimator</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            font-size: 1.5rem;
            margin-top: 0;
            text-align: center;
            color: #0f172a;
        }
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border);
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: #64748b;
        }
        .tab.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
            margin-bottom: -2px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        select, input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        select:focus, input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 6px;
            color: #1e40af;
            text-align: center;
            display: none;
        }
        .metric-highlight {
            font-size: 1.4rem;
            font-weight: 700;
            display: block;
            margin-bottom: 4px;
        }
        .sub-details {
            font-size: 0.85rem;
            color: #64748b;
            line-height: 1.4;
        }
        .calculator {
            display: none;
        }
        .calculator.active {
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Ideal-Cut Estimator</h1>
    
    <div class="tabs">
        <div class="tab active" onclick="switchTab('dimToCt')">Dimensions → Carats</div>
        <div class="tab" onclick="switchTab('ctToDim')">Carats → Dimensions</div>
    </div>

    <div class="form-group">
        <label for="shapeSelect">Diamond Shape</label>
        <select id="shapeSelect" onchange="handleShapeChange()">
            <option value="round">Round Brilliant</option>
            <option value="princess">Princess Cut</option>
            <option value="oval">Oval</option>
            <option value="emerald">Emerald Cut</option>
            <option value="marquise">Marquise</option>
            <option value="pear">Pear Shape</option>
            <option value="cushion">Cushion (Square/Modified)</option>
        </select>
    </div>

    <div id="dimToCtCalc" class="calculator active">
        <div class="form-group" id="lengthGroup" style="display:none;">
            <label for="dimLength">Length (mm)</label>
            <input type="number" id="dimLength" step="0.01" placeholder="e.g. 7.70" oninput="calcCarat()">
        </div>
        <div class="form-group">
            <label id="widthLabel" for="dimWidth">Diameter (mm)</label>
            <input type="number" id="dimWidth" step="0.01" placeholder="e.g. 6.50" oninput="calcCarat()">
        </div>
        <div id="dimToCtResult" class="result-box"></div>
    </div>

    <div id="ctToDimCalc" class="calculator">
        <div class="form-group">
            <label for="ctInput">Carat Weight (ct)</label>
            <input type="number" id="ctInput" step="0.01" placeholder="e.g. 1.00" oninput="calcDimensions()">
        </div>
        <div id="ctToDimResult" class="result-box"></div>
    </div>
</div>

<script>
    // Industry benchmarks for GIA Excellent / Ideal Proportions
    // Depth % is always evaluated relative to the WIDTH of the stone.
    const idealProportions = {
        round:    { targetDepthPct: 0.615, targetRatio: 1.00, factor: 0.0061 },
        princess: { targetDepthPct: 0.710, targetRatio: 1.00, factor: 0.0083 },
        oval:     { targetDepthPct: 0.630, targetRatio: 1.35, factor: 0.0062 },
        emerald:  { targetDepthPct: 0.650, targetRatio: 1.40, factor: 0.0080 },
        marquise: { targetDepthPct: 0.630, targetRatio: 2.00, factor: 0.0058 },
        pear:     { targetDepthPct: 0.620, targetRatio: 1.50, factor: 0.0061 },
        cushion:  { targetDepthPct: 0.670, targetRatio: 1.05, factor: 0.0081 }
    };

    let currentTab = 'dimToCt';

    function switchTab(tabId) {
        currentTab = tabId;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.calculator').forEach(c => c.classList.remove('active'));
        
        if (tabId === 'dimToCt') {
            document.querySelectorAll('.tab')[0].classList.add('active');
            document.getElementById('dimToCtCalc').classList.add('active');
            calcCarat();
        } else {
            document.querySelectorAll('.tab')[1].classList.add('active');
            document.getElementById('ctToDimCalc').classList.add('active');
            calcDimensions();
        }
    }

    function handleShapeChange() {
        const shape = document.getElementById('shapeSelect').value;
        const lengthGroup = document.getElementById('lengthGroup');
        const widthLabel = document.getElementById('widthLabel');

        if (shape === 'round') {
            lengthGroup.style.display = 'none';
            widthLabel.innerText = 'Diameter (mm)';
        } else {
            lengthGroup.style.display = 'block';
            widthLabel.innerText = 'Width (mm)';
        }
        
        if (currentTab === 'dimToCt') calcCarat();
        else calcDimensions();
    }

    // 1. DIMENSIONS TO CARATS (Extrapolating Ideal Depth)
    function calcCarat() {
        const shape = document.getElementById('shapeSelect').value;
        const resultDiv = document.getElementById('dimToCtResult');
        
        let w = parseFloat(document.getElementById('dimWidth').value);
        let l = parseFloat(document.getElementById('dimLength').value);
        
        if (shape === 'round') l = w;

        if (!w || w <= 0 || (!l && shape !== 'round')) {
            resultDiv.style.display = 'none';
            return;
        }

        const props = idealProportions[shape];
        
        // Extrapolate the depth based on an Excellent Cut profile
        const extrapolatedDepth = w * props.targetDepthPct;
        
        // Weight Formula
        const ct = l * w * extrapolatedDepth * props.factor;

        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `
            <span class="metric-highlight">${ct.toFixed(2)} ct</span>
            <span class="sub-details">
                Calculated Ratio: ${(l/w).toFixed(2)}<br>
                Extrapolated Depth: ${extrapolatedDepth.toFixed(2)} mm (${(props.targetDepthPct * 100).toFixed(1)}%)
            </span>
        `;
    }

    // 2. CARATS TO DIMENSIONS (Backwards Proportions)
    function calcDimensions() {
        const shape = document.getElementById('shapeSelect').value;
        const ct = parseFloat(document.getElementById('ctInput').value);
        const resultDiv = document.getElementById('ctToDimResult');

        if (!ct || ct <= 0) {
            resultDiv.style.display = 'none';
            return;
        }

        const props = idealProportions[shape];
        
        // Math breakdown:
        // ct = Length * Width * Depth * Factor
        // Substitute: Length = (Width * targetRatio) & Depth = (Width * targetDepthPct)
        // ct = (Width * targetRatio) * Width * (Width * targetDepthPct) * Factor
        // ct = Width^3 * (targetRatio * targetDepthPct * Factor)
        // Width = cuberoot( ct / (targetRatio * targetDepthPct * Factor) )
        
        const cuberootDenominator = props.targetRatio * props.targetDepthPct * props.factor;
        const w = Math.pow(ct / cuberootDenominator, 1/3);
        const l = w * props.targetRatio;
        const d = w * props.targetDepthPct;

        resultDiv.style.display = 'block';
        if (shape === 'round') {
            resultDiv.innerHTML = `
                <span class="metric-highlight">${w.toFixed(2)} mm Diameter</span>
                <span class="sub-details">Estimated Depth: ${d.toFixed(2)} mm</span>
            `;
        } else {
            resultDiv.innerHTML = `
                <span class="metric-highlight">${l.toFixed(2)} x ${w.toFixed(2)} mm</span>
                <span class="sub-details">
                    Target L/W Ratio: ${props.targetRatio.toFixed(2)}<br>
                    Estimated Depth: ${d.toFixed(2)} mm
                </span>
            `;
        }
    }

    // Initialize
    handleShapeChange();
</script>

</body>
</html>
